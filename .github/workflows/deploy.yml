# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# 🛑 HARD RULE: This workflow is the ONLY approved method for deploying the docker container.
# Do not run docker compose manually on the host. The runner manages the deployment lifecycle.

name: Deploy Weather Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Linting & Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Linting Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yamllint flake8 Jinja2

      - name: YAML Linter (yamllint)
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, truthy: disable, trailing-spaces: disable, empty-lines: disable}}" .

      - name: Python Linter (Flake8)
        run: flake8 . --select=E9,F63,F7,F82 --show-source --statistics

      - name: Python Basic Syntax Check
        run: |
          python -m compileall .

      - name: Jinja2 Template Validation
        run: |
          python -c "
          from jinja2 import Environment, FileSystemLoader
          env = Environment(loader=FileSystemLoader('templates'))
          for template in env.list_templates(extensions=['.html']):
              print(f'Parsing {template}...')
              env.get_template(template)
          "

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml config

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Security Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Cybersecurity Analysis (SAST - Bandit)
        run: bandit -r . -ll --exclude venv,data || echo "Bandit found potential security issues. Review logs."

      - name: Dependency Vulnerability Analysis (SCA)
        run: pip-audit || echo "pip-audit found vulnerable packages. Review logs."

      - name: Secret Leak Detection (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  e2e:
    name: E2E Browser Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install App Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install flask requests google-genai pytz python-dotenv msal markdown filelock psutil

      - name: Validate required GitHub secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Secret GEMINI_API_KEY is not configured." >&2
            exit 1
          fi
          if [ -z "$OPENWEATHERMAP_API_KEY" ]; then
            echo "Secret OPENWEATHERMAP_API_KEY is not configured." >&2
            exit 1
          fi
          
      - name: Cache Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer

      - name: Create Error Screenshots Directory
        run: mkdir -p qa_screenshots

      - name: Headless Browser JS Check (Puppeteer)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          # Start the Flask app in the background
          python app.py &
          APP_PID=$!
          
          # Wait for Flask to boot dynamically instead of a hard 10s sleep
          for i in {1..20}; do
            if curl -s http://127.0.0.1:5000/ >/dev/null; then
              break
            fi
            sleep 0.5
          done
          
          # Install Puppeteer and test for ReferenceErrors in the console!
          npm install puppeteer
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox', '--disable-setuid-sandbox'] });
            const page = await browser.newPage();
            let errors = 0;
            let errorLogs = [];
            const logError = (msg) => { console.error(msg); errorLogs.push(msg); errors++; };
            await page.setViewport({ width: 1280, height: 720 });
            page.on('dialog', async dialog => { await dialog.accept(); });
            page.on('pageerror', error => { logError('[PAGE ERROR] ' + error.message); });
            page.on('console', msg => {
              if (msg.type() === 'error' && !msg.text().includes('Failed to load resource')) {
                logError('[CONSOLE ERROR] ' + msg.text());
              }
            });
            
            const takeErrorScreenshot = async (name) => {
              try { await page.screenshot({ path: 'qa_screenshots/' + name + '.png' }); } catch (e) { console.error('Failed to take screenshot:', e); }
            };
            
            // 1. Dashboard Load
            try {
              console.log('Testing / ...');
              await page.goto('http://127.0.0.1:5000/', {waitUntil: 'domcontentloaded', timeout: 15000});
              await new Promise(r => setTimeout(r, 2000));
            } catch (e) {
              logError('[QA PAGE ERROR] Dashboard load failed: ' + e.message);
              await takeErrorScreenshot('dashboard_load_failed');
            }

            // 2. Clash Checks
            const runClashCheck = async (scenario) => {
              try {
                const layoutErrors = await page.evaluate((scenarioName) => {
                  const issues = [];
                  const checkClash = (sel1, sel2) => {
                    const el1 = document.querySelector(sel1);
                    const el2 = document.querySelector(sel2);
                    if (el1 && el2) {
                      const b1 = el1.getBoundingClientRect(); const b2 = el2.getBoundingClientRect();
                      if (b1.width === 0 || b1.height === 0 || b2.width === 0 || b2.height === 0) return; // Ignore hidden elements
                      const overlaps = !(b1.right <= b2.left || b1.left >= b2.right || b1.bottom <= b2.top || b1.top >= b2.bottom);
                      if (overlaps) issues.push('[' + scenarioName + '] Layout Clash: ' + sel1 + ' is overlapping ' + sel2 + '!');
                    }
                  };
                  if (window.location.pathname === '/') {
                    checkClash('#buddy-container', '#center-info');
                    checkClash('#header-container', '#center-info');
                    checkClash('#center-info', '.pods');
                    checkClash('#buddy-container', '#header-container');
                  } else if (window.location.pathname.includes('schools')) {
                    checkClash('.top-row', '.bottom-row');
                    checkClash('.location-date', '.current-condition');
                    checkClash('.current-condition', '.metrics');
                  }
                  
                  if (document.documentElement.scrollWidth > window.innerWidth) {
                    issues.push('[' + scenarioName + '] Anti-Vibe: Horizontal scrollbar detected!');
                  }
                  if (document.body.innerText.includes('{{') || document.body.innerText.includes('{%')) {
                    issues.push('[' + scenarioName + '] Anti-Vibe: Raw Jinja tags leaked!');
                  }
                  return issues;
                }, scenario);
                layoutErrors.forEach(err => { logError('[QA ERROR] ' + err); });
              if (layoutErrors.length > 0) await takeErrorScreenshot(scenario.replace(/ /g, '_') + '_clash');
              } catch(e) {
                logError('[QA SCENARIO ERROR] Clash check crashed: ' + e.message);
              }
            };

            try {
              console.log('Testing Scenario: Initial Load Time...');
              await runClashCheck('Initial Load');
              
              console.log('Testing Scenario: Late Night (Max Vertical Stack)...');
              await page.evaluate(() => { const el = document.getElementById('ui-desc-tomorrow'); if(el) el.style.display = 'block'; });
              await page.evaluate(() => window.moveBuddy('bed'));
              await new Promise(r => setTimeout(r, 2000)); // Wait for flight animation
              await runClashCheck('Late Night');
              
              console.log('Testing Scenario: Active Day (Max Horizontal Width)...');
              await page.evaluate(() => { const el = document.getElementById('ui-desc-tomorrow'); if(el) el.style.display = 'none'; });
              await page.evaluate(() => window.moveBuddy('store'));
              await new Promise(r => setTimeout(r, 2000)); // Wait for flight animation
              await runClashCheck('Active Day');
            } catch (e) {
              logError('[QA SCENARIO ERROR] Time travel failed: ' + e.message);
              await takeErrorScreenshot('time_travel_failed');
            }

              console.log('Testing Modalities & Holistic Interactions...');
              const modalsToTest = [
                { trigger: '#weekly-trigger', modal: 'weekly-modal' },
                { trigger: '#agenda-trigger', modal: 'agenda-modal' },
                { trigger: '#garage-trigger', modal: 'garage-modal' },
                { trigger: '#tribe-trigger', modal: 'tribe-modal' },
                { trigger: '#ui-pulse', modal: 'pulse-modal' }
              ];
              for (const mt of modalsToTest) {
                try {
                  await page.click(mt.trigger);
                  await new Promise(r => setTimeout(r, 300));
                  const isOpen = await page.evaluate((m) => {
                      const el = document.getElementById(m);
                      return el && (el.style.display === 'flex' || el.style.display === 'block');
                  }, mt.modal);
                  if (!isOpen) { logError('[QA MODAL ERROR] ' + mt.modal + ' failed to open via ' + mt.trigger + '!'); }
                  
                  await page.evaluate((m) => {
                      const closeBtn = Array.from(document.querySelectorAll('#' + m + ' .egg-btn')).find(btn => btn.innerText.includes('Close'));
                      if (closeBtn) closeBtn.click();
                      else document.getElementById(m).style.display = 'none';
                  }, mt.modal);
                  await new Promise(r => setTimeout(r, 200));
                } catch (e) {
                  logError('[QA MODAL ERROR] Interaction failed for ' + mt.trigger + ': ' + e.message);
                  await takeErrorScreenshot('modal_failed_' + mt.modal);
                }
              }
              
              console.log('Fuzzing hover tooltips & pods...');
              await page.evaluate(() => {
                document.querySelectorAll('.pod, .help-tip, [title]').forEach(el => {
                  el.dispatchEvent(new MouseEvent('mouseover', {bubbles: true}));
                });
              });
              await new Promise(r => setTimeout(r, 500));
              
              console.log('Teacher Persona: Testing Route Maker alert...');
              await page.click('#route-trigger');
              await new Promise(r => setTimeout(r, 500));

            // Sault Schools Checks
            try {
              console.log('Testing /sault-schools ...');
              await page.goto('http://127.0.0.1:5000/sault-schools', {waitUntil: 'domcontentloaded', timeout: 15000});
              await new Promise(r => setTimeout(r, 1000));
              await runClashCheck('Sault Schools 16:9');

              // Test OnePlus Nord 5G Landscape
              console.log('Testing OnePlus Nord 5G Landscape on /sault-schools ...');
              await page.setViewport({ width: 2400, height: 1080 });
              await new Promise(r => setTimeout(r, 1000));
              await runClashCheck('Sault Schools OnePlus Nord Landscape');
              
              // Revert Viewport
              await page.setViewport({ width: 1280, height: 720 });
            } catch (e) {
              logError('[QA PAGE ERROR] Sault Schools load failed: ' + e.message);
              await takeErrorScreenshot('sault_schools_failed');
            }

            try {
              console.log('Testing /pickford-schools ...');
              await page.goto('http://127.0.0.1:5000/pickford-schools', {waitUntil: 'domcontentloaded', timeout: 15000});
              await new Promise(r => setTimeout(r, 1000));
              await runClashCheck('Pickford Schools 16:9');
            } catch (e) {
              logError('[QA PAGE ERROR] Pickford Schools load failed: ' + e.message);
              await takeErrorScreenshot('pickford_schools_failed');
            }

            // EAP Featureset & Dispatch QA Test
            try {
              console.log('Testing /dispatch (PWA) and EAP Webhook...');

              // 1. Test Dispatch PWA Unlock
              await page.goto('http://127.0.0.1:5000/dispatch', {waitUntil: 'domcontentloaded', timeout: 15000});
              await new Promise(r => setTimeout(r, 1000));
              await page.type('#pin-input', '123456');
              await page.click('.auth-btn');
              await new Promise(r => setTimeout(r, 1000));
              const dispatchUnlocked = await page.evaluate(() => document.getElementById('dispatch-screen').style.display === 'flex');
              if (!dispatchUnlocked) { logError('[QA EAP ERROR] Default PIN failed to unlock dispatch PWA!'); }

              // SRO Persona: Initiate Lockdown via UI
              console.log('SRO Persona: Initiating Lockdown via UI...');
              await page.click('.btn-lockdown');
              await new Promise(r => setTimeout(r, 1500));

              // 2. Simulate Partner Webhook
              console.log('Simulating Partner Inbound Webhook (LOCKDOWN)...');
              await page.evaluate(async () => {
                await fetch('/api/eap/webhook', {
                  method: 'POST',
                  headers: {'Content-Type': 'application/json'},
                  body: JSON.stringify({IncidentType: 'LOCKDOWN', message: 'Automated QA Webhook Test'})
                });
              });
              await new Promise(r => setTimeout(r, 1500));

              // 3. Verify State was updated globally
              const eapState = await page.evaluate(async () => { const res = await fetch('/api/state'); return await res.json(); });
              if (!eapState.school_alerts || !eapState.school_alerts['sault-schools'] || eapState.school_alerts['sault-schools'].type !== 'LOCKDOWN') {
                logError('[QA EAP ERROR] Webhook failed to update global state!');
              } else { console.log('✅ EAP Webhook correctly registered LOCKDOWN across tenants.'); }
            } catch (e) {
              logError('[QA EAP ERROR] EAP test block failed: ' + e.message);
              await takeErrorScreenshot('eap_test_failed');
            }

          // --- CYBERSECURITY & FUZZING SUITE ---
          try {
            console.log('--- CYBERSECURITY & FUZZING ANALYSIS ---');

            console.log('Testing Path Traversal (/docs/%2E%2E%2Fapp.py)...');
            const ptRes = await page.goto('http://127.0.0.1:5000/docs/%2E%2E%2Fapp.py', {waitUntil: 'domcontentloaded'});
            const ptText = await page.evaluate(() => document.body ? document.body.innerText : '');
            if (ptText.includes('Flask') && ptText.includes('import')) {
              logError('[QA SECURITY ERROR] Path traversal vulnerability detected on /docs!');
            }

            console.log('Testing SQLi Auth Bypass (/login)...');
            await page.goto('http://127.0.0.1:5000/login', {waitUntil: 'domcontentloaded'});
            await page.type('input[name=\"username\"]', \"' OR '1'='1\");
            await page.type('input[name=\"password\"]', \"' OR '1'='1\");
            await Promise.all([
              page.waitForNavigation({waitUntil: 'domcontentloaded'}),
              page.evaluate(() => document.querySelector('form[action=\"/login\"]').submit())
            ]);
            if (page.url().includes('cooladmin')) {
              logError('[QA SECURITY ERROR] SQL Injection Authentication bypass succeeded!');
            }
          } catch (e) { logError('[QA SECURITY ERROR] DAST suite crashed: ' + e.message); }

          try {
            console.log('Testing /cooladmin ...');
            const adminUser = process.env.ADMIN_USERNAME || 'admin';
            const adminPass = process.env.ADMIN_PASSWORD || 'changeme';
            await page.goto('http://127.0.0.1:5000/login', {waitUntil: 'domcontentloaded', timeout: 15000});
            await page.type('input[name=\"username\"]', adminUser);
            await page.type('input[name=\"password\"]', adminPass);
            await Promise.all([
              page.waitForNavigation({waitUntil: 'domcontentloaded'}),
              page.evaluate(() => document.querySelector('form[action=\"/login\"]').submit())
            ]);
            await page.goto('http://127.0.0.1:5000/cooladmin', {waitUntil: 'domcontentloaded', timeout: 15000});
            await new Promise(r => setTimeout(r, 1000));
            
            console.log('Checking API Health and Deprecation status...');
            const healthRes = await page.evaluate(async () => {
                const res = await fetch('/api/internal/api_health');
                return await res.json();
            });
            for (const [service, info] of Object.entries(healthRes)) {
                if (info.status !== 'OK') {
                    logError(`[QA API ERROR] \${service} is reporting status \${info.status}: \${info.warnings.join(', ')}`);
                } else if (info.warnings && info.warnings.length > 0) {
                    console.warn(`[QA API WARNING] \${service} returned warnings: \${info.warnings.join(', ')}`);
                }
            }
            
            console.log('Admin Persona: Adding an EAP Multicast Listener...');
            await page.type('input[name=\"multicast_ip\"]', '239.1.1.1');
            await page.type('input[name=\"port\"]', '5001');
            await Promise.all([
              page.waitForNavigation({waitUntil: 'domcontentloaded'}),
              page.evaluate(() => { document.querySelector('input[value=\"add_eap_sub\"]').closest('form').submit(); })
            ]);
            console.log('✅ Added EAP Multicast Listener.');
            
            console.log('Testing dynamic site creation (with XSS Payload)...');
            await page.type('input[name=\"title\"]', '<script>window.XSS_VULN=true;</script>QA Test School');
            await page.type('input[name=\"slug\"]', 'qa-test');
            await page.type('input[name=\"zipcode\"]', '49783,US');
            await Promise.all([
              page.waitForNavigation({waitUntil: 'domcontentloaded'}),
              page.evaluate(() => { document.querySelector('input[value=\"add_beacon_page\"]').closest('form').submit(); })
            ]);
            console.log('✅ Created dynamic site with fuzzed payload.');

            console.log('Testing /schools/qa-test ...');
            let res = await page.goto('http://127.0.0.1:5000/schools/qa-test', {waitUntil: 'domcontentloaded'});
            if (!res.ok()) { logError('[QA PAGE ERROR] Dynamic site failed to load!'); }
            
            const isXssExecuted = await page.evaluate(() => window.XSS_VULN === true);
            if (isXssExecuted) {
              logError('[QA SECURITY ERROR] Stored XSS vulnerability detected in Dynamic Beacon Title!');
            }

            console.log('Testing /schools/qa-test/admin ...');
            res = await page.goto('http://127.0.0.1:5000/schools/qa-test/admin', {waitUntil: 'domcontentloaded'});
            if (!res.ok()) { logError('[QA PAGE ERROR] Dynamic site admin failed to load!'); }
            
            console.log('Testing /schools/qa-test/dispatch ...');
            res = await page.goto('http://127.0.0.1:5000/schools/qa-test/dispatch', {waitUntil: 'domcontentloaded'});
            if (!res.ok()) { logError('[QA PAGE ERROR] Dynamic site dispatch failed to load!'); }

            console.log('Cleaning up dynamic site...');
            await page.goto('http://127.0.0.1:5000/cooladmin', {waitUntil: 'domcontentloaded'});
            await Promise.all([
              page.waitForNavigation({waitUntil: 'domcontentloaded'}),
              page.evaluate(() => {
                const links = Array.from(document.querySelectorAll('.site-link'));
                for (const link of links) {
                  if (link.innerText.includes('/schools/qa-test')) {
                    const form = link.querySelector('input[value=\"delete_beacon_page\"]').closest('form');
                    if (form) form.submit();
                  }
                }
              })
            ]);
            console.log('✅ Deleted dynamic site.');
          } catch (e) {
            logError('[QA PAGE ERROR] CoolAdmin/Dynamic Site flow failed: ' + e.message);
            await takeErrorScreenshot('admin_flow_failed');
          }

          try {
            console.log('Extracting all internal hyperlinks for exhaustive QA spidering...');
            await page.goto('http://127.0.0.1:5000/cooladmin', {waitUntil: 'domcontentloaded', timeout: 15000});
            const allLinks = await page.evaluate(() => {
              const links = [];
              document.querySelectorAll('a[href]').forEach(el => links.push(el.href));
              return links;
            });
            const uniqueLinks = [...new Set(allLinks)].filter(l =>
              l.startsWith('http://127.0.0.1:5000') &&
              !l.includes('/logout') &&
              !l.includes('/login') &&
              !l.includes('#')
            );
            console.log('Found ' + uniqueLinks.length + ' unique routes to verify.');
            for (const link of uniqueLinks) {
              console.log('Spidering route: ' + link);
              const res = await page.goto(link, {waitUntil: 'domcontentloaded', timeout: 10000});
              if (res && !res.ok()) { logError('[QA HTTP ERROR] ' + link + ' returned ' + res.status()); }

              const pageText = await page.evaluate(() => document.body ? document.body.innerText : '');
              if (pageText && (pageText.includes('Internal Server Error') || pageText.includes('The server encountered an internal error'))) {
                logError('[QA HTTP 500] Flask crash text detected on ' + link);
              }
              if (pageText && (pageText.includes('{{') || pageText.includes('{%'))) {
                logError('[QA RENDER ERROR] Raw Jinja tags leaked on ' + link);
              }

              const brokenImages = await page.evaluate(() => {
                return Array.from(document.images).filter(img => img.complete && img.naturalWidth === 0).map(img => img.src);
              });
              if (brokenImages.length > 0) {
                logError('[QA ASSET ERROR] Broken images on ' + link + ': ' + brokenImages.join(', '));
              }
            }
          } catch (e) {
            logError('[QA SPIDER ERROR] ' + e.message);
          }

          try {
            console.log('Principal Persona: Testing /admin and adding a slide...');
            await page.goto('http://127.0.0.1:5000/admin', {waitUntil: 'domcontentloaded', timeout: 15000});
            await new Promise(r => setTimeout(r, 1000));
            await page.type('input[name=\"text\"]', 'Welcome Students! (QA Test)');
            await Promise.all([
              page.waitForNavigation({waitUntil: 'domcontentloaded'}),
              page.evaluate(() => { document.querySelector('input[value=\"add_text_slide\"]').closest('form').submit(); })
            ]);
            console.log('✅ Principal added a text slide.');
          } catch (e) {
            logError('[QA PAGE ERROR] Admin load/slide addition failed: ' + e.message);
            await takeErrorScreenshot('slide_addition_failed');
          }

            try {
              console.log('Office Worker Persona: Playing /rpg sandbox...');
              await page.goto('http://127.0.0.1:5000/rpg', {waitUntil: 'domcontentloaded', timeout: 15000});
              await new Promise(r => setTimeout(r, 1000));
              await page.keyboard.press('w');
              await page.keyboard.press(' ');
              await page.keyboard.press('f');
              await new Promise(r => setTimeout(r, 500));
              await page.keyboard.press('h');
              await new Promise(r => setTimeout(r, 1000));
              console.log('✅ Office worker successfully played RPG.');
            } catch (e) {
              logError('[QA PAGE ERROR] RPG load failed: ' + e.message);
              await takeErrorScreenshot('rpg_load_failed');
            }
            await browser.close();
            if (errors > 0) {
              console.error('\n========================================');
              console.error('❌ QA FAILED: SUMMARY OF ALL ERRORS:');
              console.error('========================================');
              errorLogs.forEach((err, idx) => console.error(`\${idx + 1}. \${err}`));
              console.error('========================================\n');
              process.exit(1);
            }
            console.log('✅ QA PASSED: No JS errors detected.');
          })().catch(err => { console.error(err); process.exit(1); });
          "
          kill $APP_PID

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-error-screenshots
          path: qa_screenshots/
          retention-days: 7

  deploy:
    needs: [lint, security, e2e]
    runs-on: [self-hosted, Linux]
    steps:
      - name: Clean up workspace permissions
        run: |
          # Use Docker to regain ownership of root-created files without a sudo password
          docker run --rm -v ${{ github.workspace }}:/workspace alpine chown -R $(id -u):$(id -g) /workspace || true
          rm -rf $GITHUB_WORKSPACE/__pycache__ || true

      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          clean: false

      - name: Create .env from Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "OPENWEATHERMAP_API_KEY=${{ secrets.OPENWEATHERMAP_API_KEY }}" >> .env
          if [ -n "${{ secrets.TV_IP }}" ]; then
            echo "TV_IP=${{ secrets.TV_IP }}" >> .env
          fi
          if [ -n "${{ secrets.DASHBOARD_URL }}" ]; then
            echo "DASHBOARD_URL=${{ secrets.DASHBOARD_URL }}" >> .env
          fi
          if [ -n "${{ secrets.ADMIN_USERNAME }}" ]; then
            echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" >> .env
          fi
          if [ -n "${{ secrets.ADMIN_PASSWORD }}" ]; then
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
          fi
          if [ -n "${{ secrets.SMTP_SERVER }}" ]; then
            echo "SMTP_SERVER=${{ secrets.SMTP_SERVER }}" >> .env
          fi
          if [ -n "${{ secrets.SMTP_PORT }}" ]; then
            echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          fi
          if [ -n "${{ secrets.SMTP_USER }}" ]; then
            echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          fi
          if [ -n "${{ secrets.SMTP_PASS }}" ]; then
            echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          fi
          if [ -n "${{ secrets.INTERNAL_API_SECRET }}" ]; then
            echo "INTERNAL_API_SECRET=${{ secrets.INTERNAL_API_SECRET }}" >> .env
          else
            echo "INTERNAL_API_SECRET=$(openssl rand -hex 32)" >> .env
          fi
          echo "BUILD_TIMESTAMP=$(TZ='America/Detroit' date +'%b %d, %Y %I:%M %p')" >> .env
          echo "HOST_DATA_DIR=${{ github.workspace }}/data" >> .env

      - name: Rebuild and Deploy
        run: |
          docker compose build
          docker compose up -d --force-recreate

      - name: Post-deploy smoke test
        run: |
          docker compose ps
          for i in $(seq 1 12); do
            if curl --fail http://127.0.0.1:5000/ >/dev/null 2>&1 && curl --fail http://127.0.0.1:5000/rpg >/dev/null 2>&1; then
              echo "Web services (Dashboard & RPG) are healthy"
              break
            fi
            echo "Waiting for web service to become available... ($i/12)"
            sleep 5
          done
          if ! curl --fail http://127.0.0.1:5000/ >/dev/null 2>&1; then
            echo "Dashboard did not respond on http://127.0.0.1:5000 after 60 seconds." >&2
            docker compose logs --tail 80
            exit 1
          fi
          if ! curl --fail http://127.0.0.1:5000/rpg >/dev/null 2>&1; then
            echo "3D World did not respond on http://127.0.0.1:5000/rpg after 60 seconds." >&2
            exit 1
          fi
          echo "Web smoke test passed."

      - name: Verify Cloudflare Tunnel Service
        run: |
          if ! systemctl is-active --quiet cloudflared; then
            echo "Cloudflare tunnel is down. Attempting to start..."
            sudo systemctl start cloudflared
            sleep 5
          fi
          if ! systemctl is-active --quiet cloudflared; then
            echo "Cloudflare tunnel failed to start. Check host logs." >&2
            exit 1
          fi
          echo "Cloudflare tunnel is active and running."

      - name: Cleanup Dangling Docker Images
        run: |
          # Aggressive Docker artifact cleanup to prevent disk space leaks
          docker image prune -f
          docker container prune -f
          docker network prune -f
          docker builder prune -f

  windows_qa:
    name: Windows Security & Syntax Check
    runs-on: [self-hosted, Windows]
    # Soft fail: won't crash your Linux deployment if a Windows check fails
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Dependencies
        # SECURE EXECUTION: Bypasses the policy ONLY for this isolated process.
        # The host Windows machine remains globally locked down (Restricted).
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Sanitize and Run Checks
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: |
          python -m compileall .
          python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
