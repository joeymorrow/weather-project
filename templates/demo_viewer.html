<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R9N02W2P9M"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        
        const isReload = window.location.search.includes('reloaded=true');
        gtag('config', 'G-R9N02W2P9M', { 'send_page_view': !isReload });
        
        if (isReload) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
    <title>BEACON Demo - {{ slug }}</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; font-family: monospace; background: #050510; color: #fff; }
        #sidebar { width: 250px; background: rgba(0, 20, 30, 0.95); border-right: 2px solid #00ffff; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; flex-shrink: 0; z-index: 10; transition: transform 0.3s ease; position: relative; }
        #content { flex-grow: 1; border: none; height: 100%; background: #000; }
        a.nav-link { color: #00ffff; text-decoration: none; font-size: 1rem; margin-bottom: 10px; display: block; transition: 0.2s; }
        a.nav-link:hover, a.nav-link.active { text-shadow: 0 0 10px #00ffff; padding-left: 5px; border-left: 2px solid #00ffff; }
        h3 { color: #fff; border-bottom: 1px solid #00ffff; padding-bottom: 5px; margin: 15px 0 10px; font-size: 1.2rem; }
        .creds { margin-top: auto; background: rgba(0,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px dashed rgba(0,255,255,0.3); font-size: 0.9rem; }
        @media (max-width: 768px) { #sidebar { display: none; } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="color: #00ffff; margin: 0; font-size: 1.5rem; letter-spacing: 2px;">☰ DEMO</h2>
            <button onclick="document.getElementById('sidebar').style.display='none'; document.getElementById('sidebar-open').style.display='block';" style="background:none; border:none; color:#0ff; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        
        <h3>Live Views</h3>
        <a href="/demo/{{ slug }}/dashboard" target="demo-frame" class="nav-link active" onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">Buddy Dashboard</a>
        <a href="/demo/{{ slug }}/school" target="demo-frame" class="nav-link" onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">School Signage</a>
        <a href="/demo/{{ slug }}/dispatch" target="demo-frame" class="nav-link" onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">EAP Dispatch</a>
        
        <h3>Admin Views</h3>
        <a href="/demo/{{ slug }}/admin" target="demo-frame" class="nav-link" onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">Local Admin</a>
        <a href="/cooladmin" target="_blank" class="nav-link">Super Admin ↗</a>
        
        <h3>Docs</h3>
        <a href="/demo/{{ slug }}/docs" target="demo-frame" class="nav-link" onclick="document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); this.classList.add('active');">Docs Hub</a>
        
        <div class="creds">
            <strong style="color: #00ffff;">Demo Admin</strong><br><br>
            User: <code>admin</code><br>
            Pass: <code>changeme</code><br>
            EAP PIN: <code>123456</code><br><br>
            <strong style="color: #ffaa00;">Expires In:</strong><br>
            <span id="countdown" style="font-weight: bold; font-size: 1.1rem; color: #ffaa00;">--:--:--</span>
        </div>
        
        <a href="https://www.morrowedge.com" target="_blank" style="margin-top: 15px; background: #00ffff; color: #000; text-decoration: none; font-weight: bold; text-align: center; border: 1px solid #00ffff; padding: 10px; border-radius: 4px; display: block;">Buy Permanent Instance</a>
        <a href="/demo" style="margin-top: 15px; color: #ff4444; text-decoration: none; font-weight: bold; text-align: center; border: 1px solid #ff4444; padding: 10px; border-radius: 4px; display: block;">Exit Demo</a>
        
        <div style="margin-top: 20px; text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.4);">
            <strong>BEACON&trade;</strong> by Morrow Edge<br><br><a href="#" style="color: rgba(255,255,255,0.4); text-decoration: none;">Terms of Service</a> &middot; <a href="#" style="color: rgba(255,255,255,0.4); text-decoration: none;">Privacy Policy</a>
        </div>
    </div>
    <button id="sidebar-open" onclick="document.getElementById('sidebar').style.display='flex'; this.style.display='none';" style="display:none; position:absolute; top:15px; left:15px; z-index:20; background:rgba(0,20,30,0.95); color:#00ffff; border:2px solid #00ffff; padding:10px; border-radius:8px; cursor:pointer; font-size:1.2rem;">☰</button>
    <iframe id="content" name="demo-frame" src="/demo/{{ slug }}/dashboard"></iframe>

    <script>
        const expiresTs = {{ expires_ts | default(0) }};
        const countdownEl = document.getElementById('countdown');
        
        function updateCountdown() {
            if (!expiresTs) return;
            const now = new Date().getTime();
            const distance = expiresTs - now;
            if (distance < 0) {
                countdownEl.innerHTML = "EXPIRED";
                countdownEl.style.color = "#ff4444";
                return;
            }
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            countdownEl.innerHTML = (hours < 10 ? "0" : "") + hours + "h " + (minutes < 10 ? "0" : "") + minutes + "m " + (seconds < 10 ? "0" : "") + seconds + "s";
        }
        if (expiresTs) { updateCountdown(); setInterval(updateCountdown, 1000); }
    </script>
</body>
</html>
