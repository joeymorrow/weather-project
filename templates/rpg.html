<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buddy's World - {{ season_name }}</title>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R9N02W2P9M"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-R9N02W2P9M');
    </script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; touch-action: none; overscroll-behavior: none; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #controls { background: rgba(0,0,0,0.7); color: #fff; padding: 15px; border-radius: 10px; border: 1px solid #00ffff; display: inline-block; }
        #tip { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,255,255,0.2); border: 2px solid #00ffff; color: #fff; padding: 15px 30px; font-size: 1.5rem; font-weight: bold; border-radius: 30px; text-transform: uppercase; display: none; z-index: 10; text-shadow: 0 2px 5px #000; box-shadow: 0 0 20px rgba(0,255,255,0.5); transition: opacity 0.3s; }
        #location-tag { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: #fff; font-weight: bold; text-shadow: 0 2px 10px #000; opacity: 0.5; transition: opacity 0.5s; text-transform: uppercase; }
        #score-ui { position: absolute; top: 60px; right: 20px; font-size: 1.5rem; color: #ffd700; font-weight: bold; text-shadow: 0 2px 5px #000; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 10; }
        .btn { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 2px solid #ff4444; color: #ff4444; padding: 10px 20px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; text-decoration: none; pointer-events: auto; z-index: 20; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: #ff4444; color: #fff; box-shadow: 0 0 15px #ff4444; }
        .t-btn { position: relative; width: clamp(78px, 18vw, 110px); height: clamp(78px, 18vw, 110px); background: rgba(0,0,0,0.5); border: clamp(1px, 0.5vw, 3px) solid #00ffff; color: #00ffff; border-radius: 50%; font-size: clamp(1.4rem, 5vw, 2.2rem); display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; touch-action: none; cursor: pointer; font-weight: bold; transition: transform 0.1s, background 0.1s; }
        .t-btn::after { content: ''; position: absolute; top: -10px; bottom: -10px; left: -10px; right: -10px; border-radius: 50%; } /* Invisible 'fat finger' hit perimeter! */
        .t-btn:active { background: #00ffff; color: #000; box-shadow: 0 0 20px #00ffff; transform: scale(0.9); }
        #touch-dpad { position: absolute; bottom: clamp(15px, 5vw, 40px); left: clamp(15px, 5vw, 40px); z-index: 30; grid-template-columns: repeat(3, auto); gap: clamp(12px, 3vw, 25px); pointer-events: auto; }
        #touch-actions { position: absolute; bottom: clamp(15px, 5vw, 40px); right: clamp(15px, 5vw, 40px); z-index: 30; display: flex; flex-direction: column; align-items: flex-end; gap: clamp(12px, 3vw, 25px); pointer-events: auto; }
        .t-row { display: flex; gap: clamp(12px, 3vw, 25px); justify-content: flex-end; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="controls">
            <h3 style="margin: 0 0 10px 0; color: #00ffff;">Buddy's World</h3>
            WASD / Arrows to Move<br>
            SHIFT to Sprint &nbsp;|&nbsp; SPACE to Jump<br>
            F to Enter/Exit Vehicle &nbsp;|&nbsp; H to Honk<br>
            E to Interact &nbsp;|&nbsp; R to Dance &nbsp;|&nbsp; M for Music
        </div>
    </div>
    <div id="tip">Press F to Enter Passat</div>
    <div id="location-tag">Sault Ste. Marie</div>
    <div id="score-ui">⭐ SCORE: 0</div>
    <a href="/" class="btn">Exit to Dashboard</a>
    
    <!-- Cinematic Dialog Box -->
    <div id="dialog-box" style="display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 2px solid #00ffff; color: #fff; padding: 20px 40px; font-size: 2rem; border-radius: 15px; z-index: 10; text-align: center; font-style: italic; box-shadow: 0 0 20px rgba(0,255,255,0.3); pointer-events: none;">...I cannot eat.</div>

    <!-- Mobile Touch Controls -->
    <div id="touch-dpad" style="display: none;">
        <div style="grid-column: 2"><div class="t-btn" id="t-up">W</div></div>
        <div style="grid-column: 1"><div class="t-btn" id="t-left">A</div></div>
        <div style="grid-column: 2"><div class="t-btn" id="t-down">S</div></div>
        <div style="grid-column: 3"><div class="t-btn" id="t-right">D</div></div>
    </div>
    <div id="touch-actions" style="display: none;">
        <div class="t-row">
            <div class="t-btn" id="t-h" style="display: none;">📯</div>
            <div class="t-btn" id="t-m">🎵</div>
            <div class="t-btn" id="t-r">🕺</div>
        </div>
        <div class="t-row">
            <div class="t-btn" id="t-shift" style="font-size: clamp(1.1rem, 3.5vw, 1.5rem);">RUN</div>
            <div class="t-btn" id="t-jump">^</div>
        </div>
        <div class="t-row">
            <div class="t-btn" id="t-e">E</div>
            <div class="t-btn" id="t-f">F</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.0012); // Pushed back to reveal the horizon!
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Drastic quality/sharpness boost for high-DPI screens!
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        hemiLight.position.set(0, 200, 0);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 200; dirLight.shadow.camera.bottom = -200;
        dirLight.shadow.camera.left = -200; dirLight.shadow.camera.right = 200;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.bias = -0.001; // Prevents "Shadow Acne" flickering!
        scene.add(dirLight);
        
        // Atmosphere: Sun & Clouds
        const sun = new THREE.Mesh(new THREE.SphereGeometry(30, 16, 16), new THREE.MeshBasicMaterial({color: 0xffffff})); // Opt: Lower poly sphere
        if ('{{ season_name }}' !== 'Winter') sun.material.color.setHex(0xffddaa); 
        sun.position.set(200, 400, -600); scene.add(sun);
        
        const clouds = new THREE.Group();
        const cloudGeo = new THREE.BoxGeometry(20, 10, 20);
        const cloudMat = new THREE.MeshLambertMaterial({color: 0xffffff, transparent: true, opacity: 0.8});
        for(let i=0; i<40; i++) {
            const cloud = new THREE.Mesh(cloudGeo, cloudMat);
            cloud.position.set((Math.random()-0.5)*1500, 100 + Math.random()*50, (Math.random()-0.5)*1500);
            cloud.scale.set(1 + Math.random()*2, 1, 1 + Math.random()*2);
            clouds.add(cloud);
        }
        scene.add(clouds);

        // Christmas Snow & Live Weather Parity!
        const isChristmas = {{ 'true' if is_christmas else 'false' }};
        const isRaining = {{ 'true' if pop > 50 else 'false' }} && !isChristmas && '{{ season_name }}' !== 'Winter';
        let weatherParticles = null;
        if (isChristmas || isRaining) {
            const wGeo = new THREE.BufferGeometry(); const wPos = [];
            for(let i=0; i<2000; i++) wPos.push((Math.random()-0.5)*1500, Math.random()*300, (Math.random()-0.5)*1500);
            wGeo.setAttribute('position', new THREE.Float32BufferAttribute(wPos, 3));
            weatherParticles = new THREE.Points(wGeo, new THREE.PointsMaterial({color: isRaining ? 0x00aaff : 0xffffff, size: isRaining ? 1.5 : 2, transparent: true, opacity: 0.8}));
            scene.add(weatherParticles);
        }

        // Terrain (Seasonal Color passed from Flask)
        const groundGeo = new THREE.PlaneGeometry(4000, 4000); // Expanded world!
        const groundMat = new THREE.MeshLambertMaterial({ color: parseInt('{{ terrain_color }}') });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // The Distant Horizon (Unreachable majestic landmarks)
        const horizonGroup = new THREE.Group();
        const mountGeo = new THREE.ConeGeometry(300, 700, 5);
        const mountMat = new THREE.MeshLambertMaterial({color: 0x334455});
        const mountInstanced = new THREE.InstancedMesh(mountGeo, mountMat, 20);
        const dummyMount = new THREE.Object3D();
        for(let i=0; i<20; i++) {
            const angle = (i / 20) * Math.PI * 2;
            const dist = 1400 + Math.random() * 200;
            dummyMount.position.set(Math.cos(angle)*dist, 200, Math.sin(angle)*dist);
            dummyMount.rotation.y = Math.random() * Math.PI;
            dummyMount.updateMatrix();
            mountInstanced.setMatrixAt(i, dummyMount.matrix);
        }
        horizonGroup.add(mountInstanced);
        const skyRingGeo = new THREE.TorusGeometry(1200, 40, 4, 24); // Opt: Reduced from 100 tubular segments to 24
        const skyRingMat = new THREE.MeshBasicMaterial({color: 0x00ffff, transparent: true, opacity: 0.1, fog: true, side: THREE.DoubleSide});
        const skyRing = new THREE.Mesh(skyRingGeo, skyRingMat);
        skyRing.rotation.x = Math.PI / 2.5;
        skyRing.position.set(0, 600, -1000);
        horizonGroup.add(skyRing);
        scene.add(horizonGroup);
        
        const platforms = []; // Array to track physical boundaries

        // Seasonal Trees Generator
        const leafColor = parseInt('{{ leaf_color }}');
        const treeGeo = new THREE.ConeGeometry(3, 10, 8);
        const trunkGeo = new THREE.CylinderGeometry(0.5, 0.5, 3, 5); // Opt: Reduced from 32 default radial segments to 5
        const treeMat = new THREE.MeshLambertMaterial({ color: leafColor });
        const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
        
        // GPU Optimization: InstancedMesh drastically reduces draw calls!
        const leafInstanced = new THREE.InstancedMesh(treeGeo, treeMat, 315);
        const trunkInstanced = new THREE.InstancedMesh(trunkGeo, trunkMat, 315);
        leafInstanced.castShadow = true; trunkInstanced.castShadow = true;
        const dummyTree = new THREE.Object3D();
        let tIdx = 0;
        
        for(let i=0; i<300; i++) {
            const x = (Math.random() - 0.5) * 1000;
            const z = (Math.random() - 0.5) * 1000;
            if(Math.abs(x) < 50 && Math.abs(z) < 50) continue; // Keep center clear
            dummyTree.position.set(x, 6, z); dummyTree.updateMatrix(); leafInstanced.setMatrixAt(tIdx, dummyTree.matrix);
            dummyTree.position.set(x, 1.5, z); dummyTree.updateMatrix(); trunkInstanced.setMatrixAt(tIdx, dummyTree.matrix);
            platforms.push({ x: x, z: z, w: 1.5, h: 10, d: 1.5 }); // Solid tree trunks!
            tIdx++;
        }

        // Player (Buddy)
        const playerGroup = new THREE.Group();
        const buddyModel = new THREE.Group(); // Inner model for floating
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0x1a73e8 }); // Buddy Blue
        const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 2), bodyMat); bodyMesh.castShadow = true; buddyModel.add(bodyMesh);
        const visorMesh = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 0.2), new THREE.MeshLambertMaterial({ color: 0x000000 })); visorMesh.position.set(0, 0.5, -1.05); buddyModel.add(visorMesh);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.1), eyeMat); eyeL.position.set(-0.4, 0.5, -1.15); buddyModel.add(eyeL);
        const eyeR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.1), eyeMat); eyeR.position.set(0.4, 0.5, -1.15); buddyModel.add(eyeR);
        const armL = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.5, 0.6), bodyMat); armL.position.set(-1.3, 0, 0); armL.rotation.z = -0.2; buddyModel.add(armL);
        const armR = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.5, 0.6), bodyMat); armR.position.set(1.3, 0, 0); armR.rotation.z = 0.2; buddyModel.add(armR);
        const auraMesh = new THREE.Mesh(new THREE.CircleGeometry(1.5, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide })); auraMesh.rotation.x = -Math.PI / 2; auraMesh.position.y = -1.4; buddyModel.add(auraMesh);
        buddyModel.position.y = 1.5; playerGroup.add(buddyModel);
        scene.add(playerGroup);

        // Companion Bot
        const botGroup = new THREE.Group();
        const botModel = new THREE.Group();
        const botBodyMat = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
        const botBodyMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 1), botBodyMat); botBodyMesh.castShadow = true; botModel.add(botBodyMesh);
        const botVisor = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.1), new THREE.MeshLambertMaterial({ color: 0x000000 })); botVisor.position.set(0, 0.25, -0.55); botModel.add(botVisor);
        const botEyeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const bEyeL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, 0.05), botEyeMat); bEyeL.position.set(-0.2, 0.25, -0.6); botModel.add(bEyeL);
        const bEyeR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, 0.05), botEyeMat); bEyeR.position.set(0.2, 0.25, -0.6); botModel.add(bEyeR);
        const botAura = new THREE.Mesh(new THREE.CircleGeometry(0.8, 32), new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.3, side: THREE.DoubleSide })); botAura.rotation.x = -Math.PI / 2; botAura.position.y = -0.7; botModel.add(botAura);
        botModel.position.y = 0.75; botGroup.add(botModel);
        botGroup.position.set(10, 0, -5);
        scene.add(botGroup);

        // Blue Passat
        const carGroup = new THREE.Group();
        const carGeo = new THREE.BoxGeometry(4, 2, 9);
        const carMat = new THREE.MeshLambertMaterial({ color: 0x000080 }); // Dark Blue
        const carMesh = new THREE.Mesh(carGeo, carMat);
        carMesh.position.y = 1; carMesh.castShadow = true;
        carGroup.add(carMesh);
        
        // Exhaust System
        const exhaustGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const exhaustMat = new THREE.MeshBasicMaterial({color: 0xaaaaaa, transparent: true, opacity: 0.4});
        
        // GPU Optimization: Zero-Allocation Particle Pool
        const puffPool = [];
        for(let i=0; i<40; i++) {
            const puff = new THREE.Mesh(exhaustGeo, exhaustMat.clone());
            puff.visible = false; scene.add(puff);
            puffPool.push({mesh: puff, life: 0, active: false});
        }

        const carShadow = new THREE.Mesh(new THREE.PlaneGeometry(4.5, 9.5), new THREE.MeshBasicMaterial({color: 0x000000, transparent: true, opacity: 0.4}));
        carShadow.rotation.x = -Math.PI / 2; carShadow.position.y = 0.05;
        carGroup.add(carShadow);
        
        // The "Juice": Passat Headlights!
        const headlight = new THREE.SpotLight(0xffffff, 2, 100, Math.PI/4, 0.5, 1);
        headlight.position.set(0, 1, -4); headlight.target.position.set(0, 0, -20);
        carGroup.add(headlight); carGroup.add(headlight.target);
        
        carGroup.position.set(-10, 0, 10);
        scene.add(carGroup);

        // Dashboard Kiosk (Exit Portal)
        const kioskGroup = new THREE.Group();
        kioskGroup.position.set(0, 0, -15);
        scene.add(kioskGroup);
        platforms.push({ x: 0, z: -15, w: 6, h: 6, d: 2 });
        
        // Dynamic Jump Shadow for Platforming
        const buddyShadow = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshBasicMaterial({color: 0x000000, transparent: true, opacity: 0.3}));
        buddyShadow.rotation.x = -Math.PI / 2; scene.add(buddyShadow);

        const kioskStandGeo = new THREE.BoxGeometry(6, 6, 2);
        const kioskStandMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const kioskStand = new THREE.Mesh(kioskStandGeo, kioskStandMat);
        kioskStand.position.y = 3;
        kioskStand.castShadow = true; kioskStand.receiveShadow = true;
        kioskGroup.add(kioskStand);

        // Kiosk Screen Canvas (Draws the real dashboard state!)
        let kioskTime = '{{ time }}';
        let kioskTemp = '{{ temp }}';
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 256; const ctx = canvas.getContext('2d');
        const kioskTex = new THREE.CanvasTexture(canvas);
        
        function updateKioskCanvas() {
            ctx.fillStyle = '#010103'; ctx.fillRect(0, 0, 512, 256);
            ctx.fillStyle = '#00ffff'; ctx.font = 'bold 24px "Segoe UI", sans-serif'; ctx.textAlign = 'center'; ctx.fillText('MORROW EDGE | BEACON', 256, 40);
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '14px "Segoe UI", sans-serif'; ctx.fillText('SAULT STE. MARIE, MICHIGAN', 256, 65);
            ctx.fillStyle = '#00ffff'; ctx.font = 'bold 50px "Segoe UI", sans-serif'; ctx.fillText(kioskTime, 256, 125);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 70px "Segoe UI", sans-serif'; ctx.fillText(kioskTemp + '°', 256, 200);
            ctx.strokeStyle = 'rgba(0,255,255,0.3)'; ctx.lineWidth = 3; for(let i=0; i<8; i++) { ctx.beginPath(); ctx.arc(80 + i*50, 230, 12, 0, Math.PI*2); ctx.stroke(); }
            kioskTex.needsUpdate = true;
        }
        updateKioskCanvas();

        const screenMesh = new THREE.Mesh(new THREE.PlaneGeometry(5.6, 2.8), new THREE.MeshBasicMaterial({ map: kioskTex }));
        screenMesh.position.set(0, 4, 1.01); kioskGroup.add(screenMesh);
        
        // Live Clock & Weather Polling for Kiosk
        let lastTempSync = Date.now();
        async function syncKioskTemp() {
            try {
                const res = await fetch('/api/state?_=' + new Date().getTime());
                const s = await res.json();
                if (s.temp && s.temp != kioskTemp) { kioskTemp = s.temp; updateKioskCanvas(); }
            } catch(e) {}
            lastTempSync = Date.now();
            setTimeout(syncKioskTemp, 300000);
        }
        setTimeout(syncKioskTemp, 300000);
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible' && Date.now() - lastTempSync > 300000) syncKioskTemp();
        });

        // Locations / Landmarks (Stylized Placeholders)
        const locations = [];
        
        // Helper Textures (Procedurally Generated for zero-bandwidth cost!)
        const winCv = document.createElement('canvas'); winCv.width = 128; winCv.height = 128;
        const wCtx = winCv.getContext('2d'); wCtx.fillStyle = '#333'; wCtx.fillRect(0,0,128,128); wCtx.fillStyle = '#add8e6'; for(let i=10; i<128; i+=30) for(let j=10; j<128; j+=40) wCtx.fillRect(i, j, 20, 30);
        const winTex = new THREE.CanvasTexture(winCv); winTex.wrapS = THREE.RepeatWrapping; winTex.wrapT = THREE.RepeatWrapping; winTex.repeat.set(2, 2);
        
        const mxCv = document.createElement('canvas'); mxCv.width = 256; mxCv.height = 256;
        const mCtx = mxCv.getContext('2d'); mCtx.fillStyle = '#000'; mCtx.fillRect(0,0,256,256); mCtx.fillStyle = '#0f0'; mCtx.font = '15px monospace'; for(let i=0; i<40; i++) { mCtx.fillText(Math.random().toString(36).substr(2, 10), Math.random()*256, Math.random()*256); }
        const mxTex = new THREE.CanvasTexture(mxCv);
        
        const dCv = document.createElement('canvas'); dCv.width = 128; dCv.height = 128;
        const dCtx = dCv.getContext('2d'); const cols = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00']; for(let i=0; i<4; i++) for(let j=0; j<4; j++) { dCtx.fillStyle = cols[(i+j)%cols.length]; dCtx.fillRect(i*32, j*32, 32, 32); }
        const dTex = new THREE.CanvasTexture(dCv); dTex.wrapS = THREE.RepeatWrapping; dTex.wrapT = THREE.RepeatWrapping; dTex.repeat.set(4, 4);

        const raveCanvas = document.createElement('canvas'); raveCanvas.width = 256; raveCanvas.height = 128; 
        const rCtx = raveCanvas.getContext('2d');
        const raveTex = new THREE.CanvasTexture(raveCanvas);

        function createSign(text, x, z) {
            const c = document.createElement('canvas'); c.width = 256; c.height = 128; const xCtx = c.getContext('2d');
            xCtx.fillStyle = '#222'; xCtx.fillRect(0,0,256,128); xCtx.strokeStyle = '#00ffff'; xCtx.lineWidth=8; xCtx.strokeRect(0,0,256,128);
            xCtx.fillStyle = '#fff'; xCtx.font = 'bold 28px sans-serif'; xCtx.textAlign = 'center'; xCtx.fillText(text, 128, 70);
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(8, 4), new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(c)}));
            mesh.position.set(x, 4, z); mesh.lookAt(0, 4, 0); scene.add(mesh);
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 4), new THREE.MeshLambertMaterial({color:0x333})); pole.position.set(x, 2, z); scene.add(pole);
        }

        function addSolidBox(color, w, h, d, x, z, tex=null) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), tex ? new THREE.MeshLambertMaterial({map: tex}) : new THREE.MeshLambertMaterial({color: color}));
            mesh.position.set(x, h/2, z); mesh.castShadow = true; mesh.receiveShadow = true; scene.add(mesh);
            platforms.push({ x: x, z: z, w: w, h: h, d: d }); return mesh;
        }
        
        // Bridge over River
        const riverGeo = new THREE.PlaneGeometry(200, 2000);
        const riverMat = new THREE.MeshLambertMaterial({ color: 0x0000ff });
        const river = new THREE.Mesh(riverGeo, riverMat);
        river.rotation.x = -Math.PI / 2; river.position.set(200, 0.1, 0); scene.add(river);
        
        const bridgeDeck = new THREE.Mesh(new THREE.BoxGeometry(250, 0.5, 20), new THREE.MeshLambertMaterial({color: 0x444444}));
        bridgeDeck.position.set(200, 0.25, 50); bridgeDeck.receiveShadow = true; scene.add(bridgeDeck); // Deck is not in 'platforms' so cars can drive over it smoothly!
        addSolidBox(0xaaaaaa, 8, 60, 6, 120, 36); // Tower 1 North Pillar
        addSolidBox(0xaaaaaa, 8, 60, 6, 120, 64); // Tower 1 South Pillar
        addSolidBox(0xaaaaaa, 8, 60, 6, 280, 36); // Tower 2 North Pillar
        addSolidBox(0xaaaaaa, 8, 60, 6, 280, 64); // Tower 2 South Pillar
        const crossbeam1 = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 36), new THREE.MeshLambertMaterial({color: 0xaaaaaa})); crossbeam1.position.set(120, 40, 50); scene.add(crossbeam1);

            buddyShadow.visible = !inCar;
            
            // Smoothly recover Squash & Stretch
            buddyModel.scale.x += (1 - buddyModel.scale.x) * 0.15;
            buddyModel.scale.y += (1 - buddyModel.scale.y) * 0.15;
            buddyModel.scale.z += (1 - buddyModel.scale.z) * 0.15;
            
            // Atmosphere Animations
            clouds.children.forEach(c => {
                c.position.x += 0.1;
                if(c.position.x > 750) c.position.x = -750;
            });
            if (weatherParticles) {
                const positions = weatherParticles.geometry.attributes.position.array;
                for(let i=1; i<positions.length; i+=3) {
                    positions[i] -= isRaining ? 2.5 : 0.4; // Rain falls much faster!
                    if(positions[i] < 0) positions[i] = 300;
                }
                weatherParticles.geometry.attributes.position.needsUpdate = true;
            }
            
            // Rave Flashing Effects & Lasers
            const rTime = Date.now() * 0.005;
            raveLasers.rotation.y = rTime * 0.2;
            raveLasers.children.forEach((l, i) => {
                l.rotation.x = Math.sin(rTime * 0.5 + i) * 0.2;
                l.rotation.z = Math.cos(rTime * 0.5 + i) * 0.2;
                l.material.color.setHSL((rTime * 0.1 + i*0.25) % 1, 1, 0.5);
            });
            
            if (mover.position.distanceTo(raveLasers.position) < 400) { // Optimize!
                const rStep = Math.floor(rTime * 1.5);
                if (rStep !== lastRStep) { // GPU Optimization: Only draw when color shifts!
                    lastRStep = rStep;
                    const rCols = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00'];
                    for(let i=0; i<4; i++) {
                        for(let j=0; j<4; j++) {
                            dCtx.fillStyle = rCols[Math.floor(i + j + rTime) % rCols.length];
                            dCtx.fillRect(i*32, j*32, 32, 32);
                        }
                    }
                    dTex.needsUpdate = true;
                    rCtx.fillStyle = '#111'; rCtx.fillRect(0, 0, 256, 128); 
                    rCtx.lineWidth = 8; rCtx.strokeStyle = rCols[Math.floor(rTime) % rCols.length]; rCtx.strokeRect(4, 4, 248, 120);
                    rCtx.fillStyle = rCols[rStep % rCols.length]; rCtx.font = 'bold 50px sans-serif'; rCtx.textAlign = 'center'; rCtx.fillText('R A V E', 128, 80);
                    raveTex.needsUpdate = true;
                }
            }

            // Byte-Shifting Demoscene Trick to color the Rave Background!
            if (isDancing && currentLoc === "Secret Rave Zone") {
                const t = Date.now();
                // Scramble the timestamp bits using XOR and Bit Shifts into a perfect 24-bit RGB integer
                const bitwiseColor = ((t >> 5) ^ ((t >> 3) << 8) ^ ((t >> 4) << 16)) & 0xFFFFFF;
                scene.background = new THREE.Color(bitwiseColor);
                scene.fog.color.setHex(bitwiseColor);
                
                // Strobe EVERYTHING in the world!
                bodyMat.color.setHex(bitwiseColor);
                botBodyMat.color.setHex(bitwiseColor);
                carMat.color.setHex(bitwiseColor);
                groundMat.color.setHex(bitwiseColor);
                treeMat.color.setHex(bitwiseColor);
                trunkMat.color.setHex(bitwiseColor);
                mountMat.color.setHex(bitwiseColor);
                riverMat.color.setHex(bitwiseColor);
                speerHull.material.color.setHex(bitwiseColor);
                speerDeck.material.color.setHex(bitwiseColor);
                speerCabin.material.color.setHex(bitwiseColor);
                speerBridge.material.color.setHex(bitwiseColor);
                speerStack.material.color.setHex(bitwiseColor);
            } else if (scene.background) {
                scene.background = null; // Restore normal transparent sky
                scene.fog.color.setHex(0x87CEEB); // Restore normal sky blue fog
                
                // Restore original materials
                bodyMat.color.setHex(0x1a73e8); botBodyMat.color.setHex(0x00ff00);
                carMat.color.setHex(0x000080); groundMat.color.setHex(parseInt('{{ terrain_color }}'));
                treeMat.color.setHex(parseInt('{{ leaf_color }}')); trunkMat.color.setHex(0x8b4513);
                mountMat.color.setHex(0x334455); riverMat.color.setHex(0x0000ff);
                speerHull.material.color.setHex(0x8b0000);
                speerDeck.material.color.setHex(0x333333);
                speerCabin.material.color.setHex(0xffffff);
                speerBridge.material.color.setHex(0xeeeeee);
                speerStack.material.color.setHex(0x111111);
            }

            // Stop music if leaving the Rave or stop dancing
            if (isPlayingMusic && (currentLoc !== "Secret Rave Zone" || !isDancing)) { stopTrack(); isDancing = false; }

            // Floating Animations
            const tAnim = Date.now() * 0.003;
            buddyModel.position.y = 1.5 + Math.sin(tAnim) * 0.2;
            auraMesh.scale.setScalar(1 + Math.sin(tAnim) * 0.1);
            botModel.position.y = 0.75 + Math.cos(tAnim * 1.2) * 0.15;
            botAura.scale.setScalar(1 + Math.cos(tAnim * 1.2) * 0.1);

            // Coin Animation & Collection
            if (coinActive) {
                coin.rotation.z += 0.05;
                coin.position.y = 10 + Math.sin(tAnim * 2) * 1.5;
                if (playerGroup.position.distanceToSquared(coin.position) < 60) {
                    coinActive = false; coin.visible = false;
                    score += 100;
                    const sUi = document.getElementById('score-ui');
                    sUi.innerText = "⭐ SCORE: " + score;
                    sUi.style.opacity = 1; sUi.style.transform = "scale(1.2)";
                    setTimeout(() => sUi.style.transform = "scale(1)", 300);
                }
            }

            // Companion Bot Roaming & Following Logic
            botGroup.position.y += (botBaseY - botGroup.position.y) * 0.2; // Climb stairs smoothly
            if (!hasBot) {
                botWait--;
                if (currentLoc === "Secret Rave Zone" && isDancing) {
                    botTarget.set(150 + (Math.random()-0.5)*10, botBaseY, 150 + (Math.random()-0.5)*10); // Race to dance floor!
                    botWait = 30; // Update path frequently
                } else if (botWait <= 0 || botGroup.position.distanceToSquared(playerGroup.position) > 90000) {
                    botWait = 60 + Math.random() * 180; // Wait 1-3 seconds
                    let angle = Math.random() * Math.PI * 2;
                    let dist = 30 + Math.random() * 70; // Roam randomly around player
                    botTarget.set(playerGroup.position.x + Math.cos(angle) * dist, 0.75, playerGroup.position.z + Math.sin(angle) * dist);
                    botTarget.x = Math.max(-980, Math.min(980, botTarget.x));
                    botTarget.z = Math.max(-980, Math.min(980, botTarget.z));
                }
                
                let dx = botTarget.x - botGroup.position.x;
                let dz = botTarget.z - botGroup.position.z;
                let d = Math.sqrt(dx*dx + dz*dz);
                if (d > 1 && !isDancing) {
                    botGroup.position.x += (dx/d) * 0.2; // Bot walking speed
                    botGroup.position.z += (dz/d) * 0.2;
                    botGroup.rotation.y = Math.atan2(dx, dz);
                    botGroup.position.y = botBaseY + Math.abs(Math.sin(Date.now() * 0.01)) * 0.5; // Walking hop
                } else if (!isDancing) {
                    botGroup.position.y = botBaseY;
                }
            } else { botGroup.rotation.y = 0; } // Reset rotation if attached

            // Dancing Modality
            if (isDancing) {
                const danceTime = Date.now() * 0.006;
                if (!inCar) {
                    if (danceMove === 0) { // The Floss Groove
                        buddyModel.rotation.y = Math.sin(danceTime) * 0.5;
                        playerGroup.position.y = targetGround + Math.abs(Math.sin(danceTime * 2)) * 0.8;
                        armL.rotation.z = -Math.PI/2 + Math.sin(danceTime * 4) * 0.5;
                        armR.rotation.z = Math.PI/2 + Math.sin(danceTime * 4) * 0.5; 
                    } else if (danceMove === 1) { // The Helicopter Spin
                        buddyModel.rotation.y = danceTime;
                        playerGroup.position.y = targetGround + Math.abs(Math.sin(danceTime * 4)) * 0.4;
                        armL.rotation.z = Math.PI; armR.rotation.z = -Math.PI; 
                    } else { // The Head Bop
                        buddyModel.rotation.y = 0; buddyModel.rotation.z = Math.sin(danceTime * 2) * 0.3;
                        playerGroup.position.y = targetGround;
                        armL.rotation.z = -Math.PI/2 + Math.cos(danceTime * 4) * 0.8;
                        armR.rotation.z = Math.PI/2 - Math.cos(danceTime * 4) * 0.8;
                    }
                }
                botModel.rotation.y = Math.cos(danceTime) * 0.5;
                if (hasBot) { /* Riding along */ } 
                else if (botGroup.position.distanceToSquared(playerGroup.position) < 6400) {
                    botGroup.position.y = botBaseY + Math.abs(Math.cos(danceTime * 2)) * 0.8;
                }
            } else {
                buddyModel.rotation.y = 0; botModel.rotation.y = 0;
                armL.rotation.z = -0.2; armR.rotation.z = 0.2; // Reset idle arms
            }

            // Tooltips
            let showTip = false;
            const dAx = playerGroup.position.x - 180; const dAz = playerGroup.position.z + 184;
            if(!inCar && playerGroup.position.distanceToSquared(kioskGroup.position) < 64) {
                tipUi.innerText = "Press E to Return to Dashboard";
                showTip = true;
            } else if(!inCar && (dAx*dAx + dAz*dAz) < 100) {
                tipUi.innerText = anchorDown ? "Press E to Raise Anchor" : "Press E to Drop Anchor";
                showTip = true;
            } else if(!inCar && playerGroup.position.distanceToSquared(carGroup.position) < 100) {
                tipUi.innerText = "Press F to Enter Passat";
                showTip = true;
            } else if(!hasBot && playerGroup.position.distanceToSquared(botGroup.position) < 100) {
                tipUi.innerText = "Press E to Pick Up Companion";
                showTip = true;
            } else if(currentLoc === "Secret Rave Zone" && !isDancing && !inCar) {
                tipUi.innerText = "Press R to Dance";
                showTip = true;
            } else if(currentLoc === "Secret Rave Zone" && isDancing && !inCar) {
                tipUi.innerText = "Press M to Change Track | R to Switch Moves";
                showTip = true;
            } else if(hasBot && !inCar) {
                tipUi.innerText = "Press E to Drop Companion";
                showTip = true;
            } else if(inCar) {
                tipUi.innerText = "Press F to Exit Vehicle";
                showTip = true;
            }
            tipUi.style.display = showTip ? 'block' : 'none';
            
            // Toggle specific touch buttons contextually
            const tH = document.getElementById('t-h'); if(tH) tH.style.display = inCar ? 'flex' : 'none';
            
            // Luigi's Fine Pasta Cinematic Interactions
            const dialogBox = document.getElementById('dialog-box');
            if (currentLoc === "Luigi's Fine Pasta") {
                let msg = "...I cannot eat.";
                if (hasBot || botGroup.position.distanceTo(playerGroup.position) < 30) {
                    msg = "...We cannot eat.";
                }
                dialogBox.innerText = msg;
                dialogBox.style.display = 'block';
            } else {
                dialogBox.style.display = 'none';
            }

            // Auto-center camera behind player when moving and not dragging
            if (!isDraggingCam && (keys.w || keys.s || keys.a || keys.d)) {
                camYaw += (0 - camYaw) * 0.05;
                camPitch += (0 - camPitch) * 0.05;
            }
            
            // 3rd Person Camera Orbit Math & FOV "Speed Juice"
            const dist = inCar ? 22 : 16;
            const heightOffset = inCar ? 8 : 5;
            const baseYaw = mover.rotation.y + camYaw;
            
            relativeCameraOffset.set(
                Math.sin(baseYaw) * dist * Math.cos(camPitch),
                heightOffset + dist * Math.sin(camPitch),
                Math.cos(baseYaw) * dist * Math.cos(camPitch)
            );
            relativeCameraOffset.add(mover.position);
            
            camera.position.lerp(relativeCameraOffset, 0.1);
            camera.lookAt(mover.position.x, mover.position.y + (inCar ? 2 : 3), mover.position.z);
            
            const targetFov = inCar ? 75 + Math.abs(carV) * 8 : 75;
            if (Math.abs(camera.fov - targetFov) > 0.1) {
                camera.fov += (targetFov - camera.fov) * 0.1;
                camera.updateProjectionMatrix();
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
