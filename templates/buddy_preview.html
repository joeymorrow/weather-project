<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy Aesthetic Preview</title>
    <style>
        body {
            background: #010103;
            color: #00ffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        .buddy-wrapper {
            position: relative;
            width: 100px;
            height: 120px;
            transform: scale(2); /* Scaled up so you can see details */
        }

        /* --- NATIVE YOOPER BUDDY CSS --- */
        .buddy-body.native-yooper {
            width: 50px;
            height: 88px;
            background-color: #0b5345;
            background-image: 
                radial-gradient(circle at 25px 48px, #fcf3cf 3px, #e74c3c 3px, #e74c3c 5px, #f1c40f 5px, #f1c40f 7px, #111 7px, #111 8px, transparent 8px),
                linear-gradient(45deg, transparent 40%, #e74c3c 40%, #e74c3c 60%, transparent 60%),
                linear-gradient(-45deg, transparent 40%, #f1c40f 40%, #f1c40f 60%, transparent 60%),
                linear-gradient(45deg, transparent 40%, #48c9b0 40%, #48c9b0 60%, transparent 60%),
                linear-gradient(-45deg, transparent 40%, #e67e22 40%, #e67e22 60%, transparent 60%);
            background-size: 100% 100%, 12px 12px, 12px 12px, 12px 12px, 12px 12px;
            background-position: 0 0, 0 65px, 0 65px, 0 77px, 0 77px;
            background-repeat: no-repeat, repeat-x, repeat-x, repeat-x, repeat-x;
            border-radius: 25px;
            position: absolute;
            left: 25px;
            top: 14px;
            box-shadow: inset 8px 12px 15px rgba(255,255,255,0.3), inset -8px -12px 15px rgba(0,0,0,0.5), 0 0 25px rgba(72,201,176,0.5);
        }

        /* The Stormy Kromer Hat */
        .buddy-body.native-yooper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -5px;
            width: 60px;
            height: 25px;
            background: #8b0000; /* Red flannel color */
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.3) 5px, rgba(0,0,0,0.3) 10px);
            border-radius: 20px 20px 5px 5px;
            box-shadow: inset 0 -4px 0 #4a0000, 0 4px 5px rgba(0,0,0,0.5);
            z-index: 5;
        }
        /* Stormy Kromer Ear Flap string */
        .buddy-body.native-yooper::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 2px;
            width: 46px;
            height: 4px;
            background: #fff;
            border-radius: 2px;
            z-index: 6;
            opacity: 0.8;
            border: 1px dashed #000;
        }

        .visor {
            width: 42px; height: 26px; background: #050505; border-radius: 12px 12px 18px 18px;
            position: absolute; top: 16px; left: 4px; display: flex; align-items: center; justify-content: space-evenly;
            box-shadow: inset 0 6px 6px rgba(255,255,255,0.25), 0 2px 10px rgba(0,0,0,0.5);
            z-index: 4; /* Keeps visor under the hat */
        }
        .eye {
            width: 8px; height: 8px; background: #00ffff; border-radius: 50%;
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }
        .arm {
            width: 12px; height: 32px; background: #006064; border-radius: 20px;
            position: absolute; top: 42px;
            box-shadow: inset 4px 6px 8px rgba(255,255,255,0.3), inset -4px -6px 8px rgba(0,0,0,0.5);
            border-left: 2px dashed #e67e22;
            border-right: 2px dashed #e67e22;
            box-sizing: border-box;
        }
        .arm.left { left: 10px; transform: rotate(10deg); }
        .arm.right { right: 10px; transform: rotate(-10deg); }
    </style>
</head>
<body>
    <div class="preview-container">
        <h2>Native American Yooper Buddy</h2>
        <div class="buddy-wrapper">
            <div class="arm left"></div>
            <div class="buddy-body native-yooper">
                <div class="visor"><div class="eye"></div><div class="eye"></div></div>
            </div>
            <div class="arm right"></div>
        </div>
    </div>
</body>
</html>
